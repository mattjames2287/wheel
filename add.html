<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbztoxKIHtLnHcZmNiL7HyMU6r8k4ze5caW4q2tc7vHk_-XvHvyYc-QtFKV2v6xCCpyK/exec";

document.getElementById("activityForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const status = document.getElementById("formStatus");
  status.innerText = "Submitting...";

  const data = {
    emoji: document.getElementById("emoji").value.trim(),
    activity: document.getElementById("activity").value.trim(),
    price: document.getElementById("price").value,
    restaurant: document.getElementById("restaurant").value.trim(),
    movie: document.getElementById("movie").value.trim()
  };

  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(data)
    });

    const text = await res.text();
    console.log("Apps Script response:", text);

    let parsed;
    try {
      parsed = JSON.parse(text);
    } catch {
      parsed = { ok: false, error: "Invalid response: " + text };
    }

    if (parsed.ok) {
      status.innerText = "Activity added successfully.";
      document.getElementById("activityForm").reset();
    } else {
      status.innerText = "Error: " + (parsed.error || "Unknown error");
    }
  } catch (err) {
    console.error(err);
    status.innerText = "Request failed: " + err;
  }
});
</script>
