<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bari Date Night Wheel - Wheel of Things To Do</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="scene">
      <div class="scene-bg"></div>
      <div class="scene-vignette"></div>
      <div class="scene-light light-a"></div>
      <div class="scene-light light-b"></div>
      <div class="scene-light light-c"></div>

      <div class="screen-panel">
        <div class="screen-inner">
          <div class="screen-kicker">BARI DATE NIGHT WHEEL</div>
          <div id="screenMain" class="screen-main">READY</div>
          <div id="screenSub" class="screen-sub">PRESS SPIN TO START</div>
        </div>
      </div>

      <div class="header-strip">
        <div class="title-block">
          <div class="eyebrow">BARI DATE NIGHT WHEEL</div>
          <h1>Wheel of Things To Do</h1>
        </div>
        <a class="btn btn-ghost" href="add.html">Add Activity</a>
      </div>

      <div class="controls-panel">
        <label for="bucket">Budget</label>
        <select id="bucket">
          <option value="all">All</option>
          <option value="0-25">$0-25</option>
          <option value="25-50">$25-50</option>
          <option value="50-100">$50-100</option>
          <option value="100+">$100+</option>
        </select>
        <div class="button-row">
          <button class="btn btn-gold" id="spin" type="button">Spin</button>
          <button class="btn btn-dark" id="surprise" type="button">Surprise Night</button>
          <button class="btn btn-dark" id="reloadData" type="button">Reload</button>
        </div>
      </div>

      <div class="wheel-zone">
        <div class="pointer"></div>
        <img id="rotor" src="roulette-rotor.png" alt="Roulette rotor">
        <div id="ball"></div>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
