<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bari Date Night Wheel - Wheel of Things To Do</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="casino-room">
<div class="vignette"></div>
<div class="ceiling-glow"></div>
</div>

<header class="topbar">
<div>
<div class="eyebrow">BARI DATE NIGHT WHEEL</div>
<h1>Bari Date Night Wheel - Wheel of Things To Do</h1>
<p class="top-sub">A casino-style wheel for picking what to do next.</p>
</div>
<div class="top-actions">
<a class="mini-btn" href="add.html">Add Activity</a>
</div>
</header>

<main class="table-scene">
<section class="table-felt">

<aside class="controls">
<label class="label">Budget</label>
<select id="bucket">
<option value="all">All</option>
<option value="0-25">$0-25</option>
<option value="25-50">$25-50</option>
<option value="50-100">$50-100</option>
<option value="100+">$100+</option>
</select>

<button id="spin" class="gold-btn">Spin</button>
<button id="surprise" class="dark-btn">Surprise Night</button>

<div id="result" class="result-box">Choose a budget and spin.</div>
</aside>

<section class="wheel-area">
<div class="pointer"></div>
<canvas id="wheel" width="720" height="720"></canvas>
</section>

</section>
<div class="table-rail"></div>
</main>

<script src="app.js"></script>
</body>
</html>
