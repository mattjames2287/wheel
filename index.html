<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vegas Date Night Roulette</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="casino-room"></div>

<header class="topbar">
  <h1>Vegas Date Night Roulette</h1>
  <div class="top-actions">
    <a class="mini-btn" href="add.html">Add Activity</a>
    <button id="musicToggle" class="mini-btn">Music</button>
  </div>
</header>

<main class="table-area">

<div class="controls">
  <label>Budget</label>
  <select id="bucket">
    <option value="all">All</option>
    <option value="0-25">$0‑25</option>
    <option value="25-50">$25‑50</option>
    <option value="50-100">$50‑100</option>
    <option value="100+">$100+</option>
  </select>

  <button id="spin" class="gold-btn">Spin</button>
  <button id="dateNight" class="dark-btn">Date Night</button>
  <button id="reloadData" class="dark-btn">Reload</button>

  <div class="meta">
    <div><span id="activityCount">0</span> activities</div>
    <div id="lastUpdated">waiting...</div>
  </div>

  <div id="result" class="result-box">Choose a budget and spin.</div>
</div>

<div class="wheel-area">
  <div class="pointer"></div>
  <canvas id="wheel" width="720" height="720"></canvas>
</div>

</main>

<div id="winnerOverlay" class="overlay hidden">
  <div class="winner-card">
    <h2 id="winnerText"></h2>
    <p id="winnerSub"></p>

    <button id="spinAgain" class="gold-btn">Spin Again</button>
    <button id="closeWinner" class="dark-btn">Close</button>
  </div>
</div>

<div id="confettiLayer"></div>
<div id="coinLayer"></div>

<script src="app.js"></script>
</body>
</html>
